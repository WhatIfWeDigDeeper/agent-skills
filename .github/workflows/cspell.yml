name: Spell Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/*.md'
      - 'specs/**/*.md'
      - 'cspell.config.yaml'

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cspell
        run: npx --yes cspell@8.14.2 "skills/**/*.md" "specs/**/*.md"
